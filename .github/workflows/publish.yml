on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
          build-essential libcurl4-openssl-dev libssl-dev libxml2-dev
          libv8-dev libglpk-dev libjpeg-dev libpoppler-cpp-dev libgit2-dev \
          libpng-dev libx11-dev libcairo2-dev libfontconfig1-dev \
          libfreetype6-dev pandoc
      
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true
          extra-repositories: https://stan-dev.r-universe.dev

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
      
      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
