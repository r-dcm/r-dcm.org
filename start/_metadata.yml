reference-location: document

freeze: false

format:
  html:
    code-link: true
    html-table-processing: none

engine: knitr

# Default knitr options
execute:
  echo: true
  message: true
  warning: true

knitr:
  opts_chunk:
    digits: 3
    comment: "#>"
    dev: "ragg_png"
    fig-align: "center"
    fig-width: 7.2916667
    out-width: "90%"
    collapse: true
